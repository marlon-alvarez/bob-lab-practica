# ============================================================================
# GitHub Workflow: Review PR with Custom Skills
# ============================================================================
#
# PURPOSE:
# Reviews pull requests using IBM Bob Shell with custom skills from the
# .bob/skills directory. Analyzes code for security, architecture, quality.
#
# REQUIREMENTS:
# - GitHub Secrets: BOBSHELL_API_KEY, GITHUB_TOKEN
# - Label: 'review-with-bob' must exist in repository
# - Skills: .bob/skills/*/SKILL.md files
#
# USAGE:
# Add 'review-with-bob' label to any PR to trigger automatic review
#
# ============================================================================

name: Review PR with Custom Skills

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  review-pr-with-skills:
    if: contains(github.event.pull_request.labels.*.name, 'review-with-bob')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi

      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          echo "Bob Shell authentication configured successfully"

      - name: Load Custom Skills
        id: load_skills
        run: |
          echo "Loading custom skills from .bob/skills/"
          SKILLS_CONTENT=""
          SKILL_COUNT=0

          for skill_dir in .bob/skills/*/; do
            if [ -d "$skill_dir" ]; then
              skill_file="${skill_dir}SKILL.md"
              if [ -f "$skill_file" ]; then
                skill_name=$(basename "$skill_dir")
                echo "Loading: $skill_name"
                SKILLS_CONTENT="${SKILLS_CONTENT}\n\n# $skill_name\n\n"
                SKILLS_CONTENT="${SKILLS_CONTENT}$(cat $skill_file)"
                SKILL_COUNT=$((SKILL_COUNT + 1))
              fi
            fi
          done

          echo "Loaded ${SKILL_COUNT} skill files"
          printf '%b' "${SKILLS_CONTENT}" > /tmp/skills_context.md
          echo "skills_count=${SKILL_COUNT}" >> $GITHUB_OUTPUT

      - name: Get PR Diff
        id: pr_diff
        run: |
          echo "Generating PR diff..."
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff ${BASE_SHA}...${HEAD_SHA} | head -c 100000 > /tmp/pr_diff.txt

          CHANGED_FILES=$(git diff --name-only ${BASE_SHA}...${HEAD_SHA} | tr '\n' ', ')
          DIFF_STATS=$(git diff --stat ${BASE_SHA}...${HEAD_SHA})

          echo "changed_files=${CHANGED_FILES}" >> $GITHUB_OUTPUT
          {
            echo "diff_stats<<EOF"
            echo "${DIFF_STATS}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Review Prompt
        run: |
          PROMPT_FILE="/tmp/review_prompt.md"

          {
            echo "Code Review Request"
            echo ""
            echo "You are an expert code reviewer analyzing a Pull Request using custom review rules."
            echo ""
            echo "Pull Request Information"
            echo ""
            echo "Repository: ${{ github.repository }}"
            echo "PR Number: ${{ github.event.pull_request.number }}"
            echo "Title: ${{ github.event.pull_request.title }}"
            echo "Author: ${{ github.event.pull_request.user.login }}"
            echo "Base Branch: ${{ github.event.pull_request.base.ref }}"
            echo "Head Branch: ${{ github.event.pull_request.head.ref }}"
            echo ""
            echo "Changed Files"
            echo ""
            echo "${{ steps.pr_diff.outputs.changed_files }}"
            echo ""
            echo "Diff Stats"
            echo ""
            echo "${{ steps.pr_diff.outputs.diff_stats }}"
            echo ""
            echo "Review Rules - Apply the following custom review rules:"
            echo ""
            cat /tmp/skills_context.md
            echo ""
            echo "Code Changes to Review"
            echo ""
            echo '```diff'
            cat /tmp/pr_diff.txt
            echo '```'
            echo ""
            echo "Review Instructions"
            echo "1. Analyze ALL code changes in the diff"
            echo "2. Apply ALL review rules from custom skills above"
            echo "3. Identify violations by severity: CRITICAL / HIGH / MEDIUM / LOW"
            echo "4. Provide specific recommendations with file and line references"
            echo "5. Highlight any security vulnerabilities immediately"
            echo "6. Suggest improvements for code quality and architecture"
          } > "${PROMPT_FILE}"

      - name: Run Bob Review
        id: bob_review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Running Bob Shell review..."
          bob --accept-license < /tmp/review_prompt.md > /tmp/bob_review.md 2>&1
          echo "Review complete ($(wc -l < /tmp/bob_review.md) lines)"

      - name: Upload Review as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: /tmp/bob_review.md
          retention-days: 30

      - name: Write Review to Step Summary
        run: |
          echo "## Bob Shell PR Review - PR ${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**Files changed:** ${{ steps.pr_diff.outputs.changed_files }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/bob_review.md >> $GITHUB_STEP_SUMMARY

      - name: Post Review Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let review = fs.readFileSync('/tmp/bob_review.md', 'utf8');

            const MAX_LENGTH = 60000;
            if (review.length > MAX_LENGTH) {
              review = review.substring(0, MAX_LENGTH) + '\n\n---\n> Review truncated. Download full report from workflow artifacts.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Bob Shell Code Review\n\n${review}`
            });

# Made with Bob
